name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 158.69.221.37
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/AJ-first
            git pull origin main
            pip install -r requirements.txt --quiet
            sudo systemctl restart normacheck
