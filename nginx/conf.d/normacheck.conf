# ============================================
# NormaCheck - Nginx Reverse Proxy
# Configuration pour acces par IP + domaine
# ============================================

upstream normacheck_backend {
    server normacheck:8000;
    keepalive 32;
}

# --- Serveur HTTP (acces par IP ou sans SSL) ---
server {
    listen 80;
    server_name _;

    # Certbot challenge (pour future config SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Upload : 2 Go max
    client_max_body_size 2G;

    # Timeouts longs pour analyses lourdes
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # API - avec rate limiting
    location /api/analyze {
        limit_req zone=upload burst=3 nodelay;
        proxy_pass http://normacheck_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://normacheck_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pages HTML
    location / {
        proxy_pass http://normacheck_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (pas de rate limit)
    location /api/health {
        proxy_pass http://normacheck_backend;
        access_log off;
    }
}

